[workspace]
members = ["dvb-common", "dvb-si", "dvb-t2mi", "dvb-bbframe", "dvb-conformance", "dvb-tools", "dvb-scte35", "dvb-stream", "dvb-pes", "dvb-subtitle", "mpeg-ps", "scte104", "dvb-cc", "dvb-ci", "dvb-smpte2038", "dvb-ule", "dvb-simulcrypt"]
exclude = ["fuzz", "demo", "bindings/python"]
resolver = "2"

[workspace.package]
authors = ["Alex Fishlock <alex.fishlock@racingjag.com>"]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/fishloa/rust-dvb"
rust-version = "1.81"
