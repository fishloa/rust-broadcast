[package]
name    = "rtp-packet"
version = "0.2.0"
edition = "2024"
description = "RTP fixed header + CSRC list + generic header extension (RFC 3550 §5.1/§5.3.1) — spec-complete parse/serialize, no_std."
license      = "MIT OR Apache-2.0"
authors      = ["Alex Fishlock <alex.fishlock@racingjag.com>"]
keywords = ["rtp", "rfc3550", "no-std", "media", "broadcast"]
categories = ["parser-implementations", "multimedia", "no-std"]
repository   = "https://github.com/fishloa/rust-broadcast"
readme       = "README.md"
rust-version = "1.86"
exclude = ["docs/**", "tests/fixtures/**"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
broadcast-common = { path = "../broadcast-common", version = "9", default-features = false }
thiserror  = { version = "2", default-features = false }
serde      = { version = "1", optional = true, features = ["derive"] }

[dev-dependencies]
serde_json = "1.0"

[features]
default = ["std"]
# `std` links the standard library. Without it the crate is `#![no_std]` and
# needs only `alloc`.
std = ["broadcast-common/std", "thiserror/std"]
serde = ["dep:serde"]
# RFC 8285 one-byte/two-byte header-extension element multiplexing. Additive
# and optional: most RTP consumers only need the RFC 3550 fixed header, so
# this is not part of `default` and adds no new dependency surface.
rfc8285 = []

[[example]]
name = "build_packet"

[[example]]
name = "parse_packet"

[[example]]
name = "rfc8285_extensions"
required-features = ["rfc8285"]
