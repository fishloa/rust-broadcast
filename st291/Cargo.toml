[package]
name    = "st291"
version = "0.1.0"
edition = "2024"
description = "SMPTE ST 291-1 ancillary (ANC) data content — typed parse/serialize for its transports, starting with ST 2038:2021 MPEG-2 TS carriage (anc_data_descriptor + ANC data PES packet)."
license      = "MIT OR Apache-2.0"
authors      = ["Alex Fishlock <alex.fishlock@racingjag.com>"]
keywords = ["st291", "smpte", "anc", "vanc", "broadcast"]
categories = ["parser-implementations", "multimedia", "no-std"]
repository   = "https://github.com/fishloa/rust-broadcast"
readme       = "README.md"
rust-version = "1.86"
exclude = ["docs/**", "tests/fixtures/**"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
broadcast-common = { path = "../broadcast-common", version = "8", default-features = false }
thiserror  = { version = "2", default-features = false }
serde      = { version = "1", optional = true, features = ["derive"] }

[dev-dependencies]
serde_json = "1.0"

[[example]]
name = "build_anc"
required-features = ["ts"]

[[example]]
name = "parse_anc"
required-features = ["ts"]

[[test]]
name = "fixture_anc"
required-features = ["ts"]

[features]
default = ["std", "ts"]
# `std` links the standard library. Without it the crate is `#![no_std]` and
# needs only `alloc`.
std = ["broadcast-common/std", "thiserror/std"]
# `ts` gates the ST 2038:2021 MPEG-2 TS transport (anc_data_descriptor + ANC
# data PES packet) -- the first of the ST 291-1 content's transports. A future
# `rtp` feature (ST 2110-40 / RFC 8331, issue #648) will sit alongside this one
# so a consumer can build with only the transport(s) it needs.
ts = []
serde = ["dep:serde"]
