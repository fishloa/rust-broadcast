# ETSI EN 300 468 Table 116 — C2 tuning frequency type codes (2-bit field)
# Reserved(u8) catch-all excluded.

[[entry]]
value = 0x00
variant = "DataSliceTuningFrequency"
spec = "Data Slice tuning frequency"

[[entry]]
value = 0x01
variant = "C2SystemCentreFrequency"
spec = "C2 system centre frequency"

[[entry]]
value = 0x02
variant = "InitialTuningPositionStaticDataSlice"
spec = "initial tuning position for a Static Data Slice"
