# ETSI EN 300 468 Table 6 — running_status codes (3-bit field)
# Reserved(u8) catch-all (values 6-7) excluded.

[[entry]]
value = 0x00
variant = "Undefined"
spec = "undefined"

[[entry]]
value = 0x01
variant = "NotRunning"
spec = "not running"

[[entry]]
value = 0x02
variant = "StartsInAFewSeconds"
spec = "starts in a few seconds"

[[entry]]
value = 0x03
variant = "Pausing"
spec = "pausing"

[[entry]]
value = 0x04
variant = "Running"
spec = "running"

[[entry]]
value = 0x05
variant = "ServiceOffAir"
spec = "service off-air"
