[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "transmux-py"
description = "Python bindings for transmux — demux TS/fMP4 into the shared Media/Track/Sample IR as Python dicts, ready for PyAV/ONNX-style ML front-ends."
requires-python = ">=3.9"
license = { text = "MIT OR Apache-2.0" }
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Multimedia :: Video",
]
dynamic = ["version"]

[project.urls]
Repository = "https://github.com/fishloa/rust-broadcast"

[tool.maturin]
# abi3 wheel: one wheel works across CPython >=3.9.
features = ["pyo3/abi3-py39"]
module-name = "transmux_py"
manifest-path = "Cargo.toml"
