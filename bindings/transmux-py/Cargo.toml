[workspace]

[package]
name    = "transmux-py"
version = "0.1.0"
edition = "2021"
description = "Python bindings for transmux — demux TS/fMP4 into the shared Media/Track/Sample IR as Python dicts, ready for PyAV/ONNX-style ML front-ends."
license      = "MIT OR Apache-2.0"
authors      = ["Alex Fishlock <alex.fishlock@racingjag.com>"]
repository   = "https://github.com/fishloa/rust-broadcast"
readme       = "README.md"
# NOT a workspace member (PyO3 MSRV moves faster than the workspace 1.86); it
# consumes the published transmux crate by version, not path (mirrors
# bindings/python/dvb-si-py).

[lib]
name = "transmux_py"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.24", features = ["extension-module", "abi3-py39"] }
# Consumed by VERSION (from crates.io), not path — keeps the binding decoupled
# from the workspace and its MSRV/lockstep.
broadcast-common = "8"
transmux         = "0.15"
