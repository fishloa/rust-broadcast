name: Release rdd29

# Publishes the rdd29 crate to crates.io on a `rdd29-v*` tag.
# rdd29 is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it
# is a standalone reusable crate with its own cadence, in the spirit of
# mpeg-ts/rtp-packet/st291/st337), so it has its own publish workflow. CI is
# the only source of published artifacts — never `cargo publish` from a
# workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["rdd29-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish rdd29 to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — rdd29 tests
        run: cargo test -p rdd29 --all-features --locked

      - name: Gate — rdd29 clippy
        run: cargo clippy -p rdd29 --all-features --all-targets --locked -- -D warnings

      - name: Gate — rdd29 no_std build
        run: cargo build -p rdd29 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches rdd29 version
        run: |
          TAG="${GITHUB_REF_NAME#rdd29-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['rdd29'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::rdd29 is $V but tag is $TAG"; exit 1
          fi

      # rdd29's broadcast-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish rdd29
        run: |
          if out=$(cargo publish -p rdd29 --locked 2>&1); then
            echo "$out"; echo "::notice::published rdd29"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::rdd29 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish rdd29"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
