name: Release dvb-ci-runtime

# Publishes the dvb-ci-runtime crate to crates.io on a `dvb-ci-runtime-v*` tag.
# dvb-ci-runtime is a std-only crate versioned and released INDEPENDENTLY of the
# lockstep `v*` tag (it follows dvb-ci's cadence, not the core MSRV lockstep), so
# it has its own publish workflow. CI is the only source of published artifacts —
# never `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-ci-runtime-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-ci-runtime to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-ci-runtime tests
        run: cargo test -p dvb-ci-runtime --all-features --locked

      - name: Gate — dvb-ci-runtime clippy
        run: cargo clippy -p dvb-ci-runtime --all-features --all-targets --locked -- -D warnings

      - name: Gate — tag matches dvb-ci-runtime version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-ci-runtime-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-ci-runtime'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-ci-runtime is $V but tag is $TAG"; exit 1
          fi

      # dvb-ci-runtime's dvb-ci / dvb-common dependencies must already be on
      # crates.io. Idempotent: an "already uploaded" error is treated as success
      # so a re-run is safe.
      - name: Publish dvb-ci-runtime
        run: |
          if out=$(cargo publish -p dvb-ci-runtime --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-ci-runtime"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-ci-runtime already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-ci-runtime"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
