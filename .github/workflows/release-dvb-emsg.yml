name: Release dvb-emsg

# Publishes the dvb-emsg crate to crates.io on a `dvb-emsg-v*` tag.
# dvb-emsg is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence), so it has its own
# publish workflow. CI is the only source of published artifacts — never
# `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-emsg-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-emsg to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-emsg tests
        run: cargo test -p dvb-emsg --all-features --locked

      - name: Gate — dvb-emsg clippy
        run: cargo clippy -p dvb-emsg --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-emsg no_std build
        run: cargo build -p dvb-emsg --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-emsg version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-emsg-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-emsg'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-emsg is $V but tag is $TAG"; exit 1
          fi

      # dvb-emsg's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish dvb-emsg
        run: |
          if out=$(cargo publish -p dvb-emsg --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-emsg"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-emsg already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-emsg"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
