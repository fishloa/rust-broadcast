name: Release multimux

# Publishes the multimux crate to crates.io on a `multimux-v*` tag.
# multimux is versioned and released INDEPENDENTLY. CI is the only source of
# published artifacts — never `cargo publish` from a workstation. Requires the
# CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: multimux depends on transmux and rtsp-runtime (plus the
# published sdp-types / url / axum / tokio). Publish transmux (>= the referenced
# 0.17) and rtsp-runtime FIRST, or crates.io will reject the publish because a
# required dependency is not yet live.
#
# multimux is a std (tokio + axum) application crate — no no_std gate.

on:
  push:
    tags: ["multimux-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish multimux to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — multimux tests
        run: cargo test -p multimux --all-features --locked

      - name: Gate — multimux clippy
        run: cargo clippy -p multimux --all-features --all-targets --locked -- -D warnings

      - name: Gate — tag matches multimux version
        run: |
          TAG="${GITHUB_REF_NAME#multimux-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['multimux'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::multimux is $V but tag is $TAG"; exit 1
          fi

      - name: Publish multimux
        run: |
          if out=$(cargo publish -p multimux --locked 2>&1); then
            echo "$out"; echo "::notice::published multimux"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::multimux already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish multimux"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
