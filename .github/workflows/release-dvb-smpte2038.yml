name: Release dvb-smpte2038

# Publishes the dvb-smpte2038 crate to crates.io on a `dvb-smpte2038-v*` tag.
# dvb-smpte2038 is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence), so it has its own
# publish workflow. CI is the only source of published artifacts — never
# `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-smpte2038-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-smpte2038 to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-smpte2038 tests
        run: cargo test -p dvb-smpte2038 --all-features --locked

      - name: Gate — dvb-smpte2038 clippy
        run: cargo clippy -p dvb-smpte2038 --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-smpte2038 no_std build
        run: cargo build -p dvb-smpte2038 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-smpte2038 version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-smpte2038-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-smpte2038'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-smpte2038 is $V but tag is $TAG"; exit 1
          fi

      # dvb-smpte2038's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish dvb-smpte2038
        run: |
          if out=$(cargo publish -p dvb-smpte2038 --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-smpte2038"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-smpte2038 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-smpte2038"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
