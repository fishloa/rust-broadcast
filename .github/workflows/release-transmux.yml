name: Release transmux

# Publishes the transmux crate to crates.io on a `transmux-v*` tag.
# transmux is versioned and released INDEPENDENTLY (standalone reusable crate
# with its own cadence). CI is the only source of published artifacts — never
# `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: transmux depends only on broadcast-common (lockstep, already
# live). Its mpeg-ts / mpeg-pes / media-doctor deps are dev-only (tests) and do
# not gate publishing.

on:
  push:
    tags: ["transmux-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish transmux to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — transmux tests
        run: cargo test -p transmux --all-features --locked

      - name: Gate — transmux clippy
        run: cargo clippy -p transmux --all-features --all-targets --locked -- -D warnings

      - name: Gate — transmux no_std (+alloc) build
        run: cargo build -p transmux --no-default-features --locked

      - name: Gate — tag matches transmux version
        run: |
          TAG="${GITHUB_REF_NAME#transmux-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['transmux'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::transmux is $V but tag is $TAG"; exit 1
          fi

      - name: Publish transmux
        run: |
          if out=$(cargo publish -p transmux --locked 2>&1); then
            echo "$out"; echo "::notice::published transmux"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::transmux already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish transmux"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
