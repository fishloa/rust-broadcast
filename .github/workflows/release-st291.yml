name: Release st291

# Publishes the st291 crate to crates.io on a `st291-v*` tag.
# st291 is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it
# is a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.
#
# Formerly smpte2038 (and, before that, dvb-smpte2038); both prior names are
# being yanked from crates.io rather than carried forward as deprecated shims
# (issue #647). This workflow supersedes release-smpte2038.yml and
# release-dvb-smpte2038.yml, both deleted.

on:
  push:
    tags: ["st291-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish st291 to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — st291 tests
        run: cargo test -p st291 --all-features --locked

      - name: Gate — st291 clippy
        run: cargo clippy -p st291 --all-features --all-targets --locked -- -D warnings

      - name: Gate — st291 no_std build
        run: cargo build -p st291 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches st291 version
        run: |
          TAG="${GITHUB_REF_NAME#st291-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['st291'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::st291 is $V but tag is $TAG"; exit 1
          fi

      # st291's broadcast-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish st291
        run: |
          if out=$(cargo publish -p st291 --locked 2>&1); then
            echo "$out"; echo "::notice::published st291"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::st291 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish st291"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
