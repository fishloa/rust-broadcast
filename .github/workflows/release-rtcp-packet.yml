name: Release rtcp-packet

# Publishes the rtcp-packet crate to crates.io on a `rtcp-packet-v*` tag.
# rtcp-packet is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence, in the spirit of
# rtp-packet/mpeg-ts/mpeg-pes/mpeg-ps), so it has its own publish workflow.
# CI is the only source of published artifacts — never `cargo publish` from a
# workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["rtcp-packet-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish rtcp-packet to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — rtcp-packet tests
        run: cargo test -p rtcp-packet --all-features --locked

      - name: Gate — rtcp-packet clippy
        run: cargo clippy -p rtcp-packet --all-features --all-targets --locked -- -D warnings

      - name: Gate — rtcp-packet no_std build
        run: cargo build -p rtcp-packet --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches rtcp-packet version
        run: |
          TAG="${GITHUB_REF_NAME#rtcp-packet-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['rtcp-packet'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::rtcp-packet is $V but tag is $TAG"; exit 1
          fi

      # rtcp-packet's broadcast-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish rtcp-packet
        run: |
          if out=$(cargo publish -p rtcp-packet --locked 2>&1); then
            echo "$out"; echo "::notice::published rtcp-packet"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::rtcp-packet already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish rtcp-packet"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
