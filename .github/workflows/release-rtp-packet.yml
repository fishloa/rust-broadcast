name: Release rtp-packet

# Publishes the rtp-packet crate to crates.io on a `rtp-packet-v*` tag.
# rtp-packet is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence, in the spirit of
# mpeg-ts/mpeg-pes/mpeg-ps), so it has its own publish workflow. CI is the
# only source of published artifacts — never `cargo publish` from a
# workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["rtp-packet-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish rtp-packet to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — rtp-packet tests
        run: cargo test -p rtp-packet --all-features --locked

      - name: Gate — rtp-packet clippy
        run: cargo clippy -p rtp-packet --all-features --all-targets --locked -- -D warnings

      - name: Gate — rtp-packet no_std build
        run: cargo build -p rtp-packet --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches rtp-packet version
        run: |
          TAG="${GITHUB_REF_NAME#rtp-packet-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['rtp-packet'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::rtp-packet is $V but tag is $TAG"; exit 1
          fi

      # rtp-packet's broadcast-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish rtp-packet
        run: |
          if out=$(cargo publish -p rtp-packet --locked 2>&1); then
            echo "$out"; echo "::notice::published rtp-packet"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::rtp-packet already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish rtp-packet"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
