name: Release ts-fix

# Publishes the ts-fix crate to crates.io on a `ts-fix-v*` tag.
# ts-fix is versioned and released INDEPENDENTLY. CI is the only source of
# published artifacts — never `cargo publish` from a workstation. Requires the
# CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: ts-fix depends on mpeg-ts, mpeg-pes, dvb-si and scte35-splice.
# Publish those at the referenced versions FIRST, or crates.io will reject the
# publish because a required dependency is not yet live.

on:
  push:
    tags: ["ts-fix-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish ts-fix to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Gate — ts-fix tests
        run: cargo test -p ts-fix --all-features --locked

      - name: Gate — ts-fix clippy
        run: cargo clippy -p ts-fix --all-features --all-targets --locked -- -D warnings

      - name: Gate — ts-fix no_std (+alloc) lib build
        run: cargo build -p ts-fix --no-default-features --locked

      - name: Gate — tag matches ts-fix version
        run: |
          TAG="${GITHUB_REF_NAME#ts-fix-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['ts-fix'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::ts-fix is $V but tag is $TAG"; exit 1
          fi

      - name: Publish ts-fix
        run: |
          if out=$(cargo publish -p ts-fix --locked 2>&1); then
            echo "$out"; echo "::notice::published ts-fix"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::ts-fix already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish ts-fix"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
