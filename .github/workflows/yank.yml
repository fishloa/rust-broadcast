name: Yank

# Manually yank (or un-yank) one or more versions of one or more crates on
# crates.io. Uses the CARGO_REGISTRY_TOKEN repository secret — the CLI never
# holds the token (publishing and yanking are CI-only operations in this repo).
#
#   gh workflow run yank.yml -f version=3.0.0
#   gh workflow run yank.yml -f version=3.0.0 -f undo=true
#   gh workflow run yank.yml -f crates=smpte2038 -f version=0.1.0,0.1.1,0.2.0

on:
  workflow_dispatch:
    inputs:
      crates:
        description: "Comma-separated crate names to yank"
        required: false
        default: "dvb-common,dvb-si,dvb-t2mi,dvb-bbframe"
      version:
        description: "Comma-separated version(s) to yank (e.g. 3.0.0 or 0.1.0,0.1.1)"
        required: true
      undo:
        description: "Un-yank instead"
        type: boolean
        default: false

jobs:
  yank:
    name: yank crates.io ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Yank crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          FLAG=""
          if [ "${{ inputs.undo }}" = "true" ]; then FLAG="--undo"; fi
          IFS=',' read -ra CRATES <<< "${{ inputs.crates }}"
          IFS=',' read -ra VERSIONS <<< "${{ inputs.version }}"
          for c in "${CRATES[@]}"; do
            for v in "${VERSIONS[@]}"; do
              cargo yank $FLAG --version "$v" "$c"
            done
          done
