name: Release srt-runtime

# Publishes the srt-runtime crate to crates.io on a `srt-runtime-v*` tag.
# srt-runtime is versioned and released INDEPENDENTLY. CI is the only source of
# published artifacts — never `cargo publish` from a workstation. Requires the
# CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: srt-runtime depends on broadcast-common (path dep, version
# "8"), so broadcast-common must already be published at a compatible version
# before this tag is pushed.

on:
  push:
    tags: ["srt-runtime-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish srt-runtime to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — srt-runtime tests (all features)
        run: cargo test -p srt-runtime --all-features --locked

      - name: Gate — srt-runtime clippy
        run: cargo clippy -p srt-runtime --all-features --all-targets --locked -- -D warnings

      - name: Gate — srt-runtime sans-IO (no-default) lib build
        run: cargo build -p srt-runtime --no-default-features --locked

      - name: Gate — tag matches srt-runtime version
        run: |
          TAG="${GITHUB_REF_NAME#srt-runtime-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['srt-runtime'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::srt-runtime is $V but tag is $TAG"; exit 1
          fi

      - name: Publish srt-runtime
        run: |
          if out=$(cargo publish -p srt-runtime --locked 2>&1); then
            echo "$out"; echo "::notice::published srt-runtime"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::srt-runtime already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish srt-runtime"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
