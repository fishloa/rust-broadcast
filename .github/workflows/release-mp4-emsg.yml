name: Release mp4-emsg

# Publishes the mp4-emsg crate to crates.io on a `mp4-emsg-v*` tag.
# mp4-emsg is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence), so it has its own
# publish workflow. CI is the only source of published artifacts — never
# `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["mp4-emsg-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish mp4-emsg to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — mp4-emsg tests
        run: cargo test -p mp4-emsg --all-features --locked

      - name: Gate — mp4-emsg clippy
        run: cargo clippy -p mp4-emsg --all-features --all-targets --locked -- -D warnings

      - name: Gate — mp4-emsg no_std build
        run: cargo build -p mp4-emsg --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches mp4-emsg version
        run: |
          TAG="${GITHUB_REF_NAME#mp4-emsg-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['mp4-emsg'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::mp4-emsg is $V but tag is $TAG"; exit 1
          fi

      # mp4-emsg's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish mp4-emsg
        run: |
          if out=$(cargo publish -p mp4-emsg --locked 2>&1); then
            echo "$out"; echo "::notice::published mp4-emsg"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::mp4-emsg already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish mp4-emsg"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
