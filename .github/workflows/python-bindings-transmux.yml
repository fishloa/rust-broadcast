name: Python bindings (transmux-py)

# The transmux-py PyO3 binding lives outside the Rust workspace (its own MSRV)
# and consumes the published transmux crate by version. This workflow tests it
# on PRs touching the binding, and builds + publishes wheels on a
# `transmux-py-v*` tag. Wheels are the ONLY published Python artifact and
# come solely from here. Mirrors `.github/workflows/python-bindings.yml`
# (dvb-si-py) — kept as its own workflow, rather than folded into that one,
# so each binding's tag/path triggers and release cadence stay independent.

on:
  push:
    tags: ["transmux-py-v*"]
  pull_request:
    paths: ["bindings/transmux-py/**", ".github/workflows/python-bindings-transmux.yml"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: build (pip install via maturin backend) + pytest
        working-directory: bindings/transmux-py
        run: |
          python -m pip install --upgrade pip pytest
          pip install .          # builds + installs the wheel via the maturin build-backend
          pytest -q

  wheels:
    name: wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/transmux-py-v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path bindings/transmux-py/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish:
    name: publish to PyPI
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/transmux-py-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
