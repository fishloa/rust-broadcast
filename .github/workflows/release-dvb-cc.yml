name: Release dvb-cc

# Publishes the dvb-cc crate to crates.io on an `dvb-cc-v*` tag.
# dvb-cc is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is
# a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-cc-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-cc to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-cc tests
        run: cargo test -p dvb-cc --all-features --locked

      - name: Gate — dvb-cc clippy
        run: cargo clippy -p dvb-cc --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-cc no_std build
        run: cargo build -p dvb-cc --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-cc version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-cc-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-cc'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-cc is $V but tag is $TAG"; exit 1
          fi

      # dvb-cc's dvb-common + dvb-pes dependencies must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish dvb-cc
        run: |
          if out=$(cargo publish -p dvb-cc --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-cc"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-cc already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-cc"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
