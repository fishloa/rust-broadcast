name: Release st12-1

# Publishes the st12-1 crate to crates.io on a `st12-1-v*` tag.
# st12-1 is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence, in the spirit of
# mpeg-ts/mpeg-pes/mpeg-ps/rtp-packet), so it has its own publish workflow.
# CI is the only source of published artifacts — never `cargo publish` from
# a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["st12-1-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish st12-1 to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — st12-1 tests
        run: cargo test -p st12-1 --all-features --locked

      - name: Gate — st12-1 clippy
        run: cargo clippy -p st12-1 --all-features --all-targets --locked -- -D warnings

      - name: Gate — st12-1 no_std build
        run: cargo build -p st12-1 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches st12-1 version
        run: |
          TAG="${GITHUB_REF_NAME#st12-1-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['st12-1'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::st12-1 is $V but tag is $TAG"; exit 1
          fi

      # st12-1's broadcast-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish st12-1
        run: |
          if out=$(cargo publish -p st12-1 --locked 2>&1); then
            echo "$out"; echo "::notice::published st12-1"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::st12-1 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish st12-1"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
