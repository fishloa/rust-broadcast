name: Release dvb-flute

# Publishes the dvb-flute crate to crates.io on a `dvb-flute-v*` tag.
# dvb-flute is versioned and released INDEPENDENTLY of the lockstep `v*` tag
# (it is a standalone reusable crate with its own cadence), so it has its own
# publish workflow. CI is the only source of published artifacts — never
# `cargo publish` from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-flute-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-flute to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-flute tests
        run: cargo test -p dvb-flute --all-features --locked

      - name: Gate — dvb-flute clippy
        run: cargo clippy -p dvb-flute --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-flute no_std build
        run: cargo build -p dvb-flute --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-flute version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-flute-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-flute'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-flute is $V but tag is $TAG"; exit 1
          fi

      # dvb-flute's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish dvb-flute
        run: |
          if out=$(cargo publish -p dvb-flute --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-flute"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-flute already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-flute"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
