name: Release ule

# Publishes the ule crate to crates.io on a `ule-v*` tag.
# ule is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is a
# standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.
#
# Formerly dvb-ule; the `dvb-ule` shim is published via release-dvb-ule.yml on
# dvb-ule-v* tags.

on:
  push:
    tags: ["ule-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish ule to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — ule tests
        run: cargo test -p ule --all-features --locked

      - name: Gate — ule clippy
        run: cargo clippy -p ule --all-features --all-targets --locked -- -D warnings

      - name: Gate — ule no_std build
        run: cargo build -p ule --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches ule version
        run: |
          TAG="${GITHUB_REF_NAME#ule-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['ule'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::ule is $V but tag is $TAG"; exit 1
          fi

      # ule's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish ule
        run: |
          if out=$(cargo publish -p ule --locked 2>&1); then
            echo "$out"; echo "::notice::published ule"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::ule already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish ule"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
