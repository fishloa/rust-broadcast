name: Release dvb-scte35 (shim)

# Publishes the dvb-scte35 DEPRECATION SHIM to crates.io on a `dvb-scte35-v*`
# tag. dvb-scte35 is now a thin re-export wrapper over scte35-splice; it must
# be published AFTER the corresponding scte35-splice version is live on
# crates.io (ordering is handled at tag time — tag scte35-splice-v* first,
# wait for its workflow to complete, then tag dvb-scte35-v*). CI is the only
# source of published artifacts — never `cargo publish` from a workstation.
# Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-scte35-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-scte35 shim to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-scte35 tests
        run: cargo test -p dvb-scte35 --all-features --locked

      - name: Gate — dvb-scte35 clippy
        run: cargo clippy -p dvb-scte35 --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-scte35 no_std build
        run: cargo build -p dvb-scte35 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-scte35 version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-scte35-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-scte35'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-scte35 is $V but tag is $TAG"; exit 1
          fi

      # dvb-scte35's scte35-splice dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish dvb-scte35 shim
        run: |
          if out=$(cargo publish -p dvb-scte35 --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-scte35"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-scte35 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-scte35"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
