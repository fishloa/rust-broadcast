name: Release scte104

# Publishes the scte104 crate to crates.io on an `scte104-v*` tag.
# scte104 is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is
# a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["scte104-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish scte104 to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — scte104 tests
        run: cargo test -p scte104 --all-features --locked

      - name: Gate — scte104 clippy
        run: cargo clippy -p scte104 --all-features --all-targets --locked -- -D warnings

      - name: Gate — scte104 no_std build
        run: cargo build -p scte104 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches scte104 version
        run: |
          TAG="${GITHUB_REF_NAME#scte104-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['scte104'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::scte104 is $V but tag is $TAG"; exit 1
          fi

      # scte104's dvb-common + dvb-pes dependencies must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish scte104
        run: |
          if out=$(cargo publish -p scte104 --locked 2>&1); then
            echo "$out"; echo "::notice::published scte104"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::scte104 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish scte104"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
