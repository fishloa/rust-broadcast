name: Release timed-metadata

# Publishes the timed-metadata crate to crates.io on a `timed-metadata-v*` tag.
# timed-metadata is versioned and released INDEPENDENTLY (a standalone reusable
# crate with its own cadence), so it has its own publish workflow. CI is the only
# source of published artifacts — never `cargo publish` from a workstation.
# Requires the CARGO_REGISTRY_TOKEN secret.
#
# NOTE: timed-metadata depends on `scte35-splice` and `mp4-emsg` by version, so
# both MUST already be live on crates.io before this tag is pushed, or the publish
# step will fail to resolve.

on:
  push:
    tags: ["timed-metadata-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish timed-metadata to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — timed-metadata tests
        run: cargo test -p timed-metadata --all-features --locked

      - name: Gate — timed-metadata clippy
        run: cargo clippy -p timed-metadata --all-features --all-targets --locked -- -D warnings

      - name: Gate — timed-metadata no_std build
        run: cargo build -p timed-metadata --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches timed-metadata version
        run: |
          TAG="${GITHUB_REF_NAME#timed-metadata-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['timed-metadata'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::timed-metadata is $V but tag is $TAG"; exit 1
          fi

      # timed-metadata's scte35-splice / mp4-emsg / dvb-common dependencies must
      # already be on crates.io. Idempotent: an "already uploaded" error is treated
      # as success so a re-run is safe.
      - name: Publish timed-metadata
        run: |
          if out=$(cargo publish -p timed-metadata --locked 2>&1); then
            echo "$out"; echo "::notice::published timed-metadata"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::timed-metadata already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish timed-metadata"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
