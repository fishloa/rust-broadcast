name: Release media-doctor

# Publishes the media-doctor crate to crates.io on a `media-doctor-v*` tag.
# media-doctor is versioned and released INDEPENDENTLY. CI is the only source of
# published artifacts — never `cargo publish` from a workstation. Requires the
# CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: media-doctor depends on mpeg-ts, mpeg-pes, timed-metadata,
# scte35-splice and dvb-si. Publish those at the referenced versions FIRST, or
# crates.io will reject the publish because a required dependency is not yet live.

on:
  push:
    tags: ["media-doctor-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish media-doctor to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — media-doctor tests
        run: cargo test -p media-doctor --all-features --locked

      - name: Gate — media-doctor clippy
        run: cargo clippy -p media-doctor --all-features --all-targets --locked -- -D warnings

      - name: Gate — media-doctor no_std (+alloc) lib build
        run: cargo build -p media-doctor --no-default-features --locked

      - name: Gate — tag matches media-doctor version
        run: |
          TAG="${GITHUB_REF_NAME#media-doctor-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['media-doctor'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::media-doctor is $V but tag is $TAG"; exit 1
          fi

      - name: Publish media-doctor
        run: |
          if out=$(cargo publish -p media-doctor --locked 2>&1); then
            echo "$out"; echo "::notice::published media-doctor"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::media-doctor already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish media-doctor"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
