name: Release mpeg-ts

# Publishes the mpeg-ts crate to crates.io on an `mpeg-ts-v*` tag.
# mpeg-ts is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is
# a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: mpeg-ts depends on dvb-common (lockstep). Publish the lockstep
# release (via the `v*` tag) before tagging `mpeg-ts-v*`, or crates.io will reject
# the publish because the required dvb-common version is not yet live.

on:
  push:
    tags: ["mpeg-ts-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish mpeg-ts to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — mpeg-ts tests
        run: cargo test -p mpeg-ts --all-features --locked

      - name: Gate — mpeg-ts clippy
        run: cargo clippy -p mpeg-ts --all-features --all-targets --locked -- -D warnings

      - name: Gate — mpeg-ts no_std build
        run: cargo build -p mpeg-ts --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches mpeg-ts version
        run: |
          TAG="${GITHUB_REF_NAME#mpeg-ts-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['mpeg-ts'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::mpeg-ts is $V but tag is $TAG"; exit 1
          fi

      # mpeg-ts's dvb-common dependency must already be on crates.io (it ships via
      # the lockstep `v*` release). Idempotent: an "already uploaded" error is
      # treated as success so a re-run is safe.
      - name: Publish mpeg-ts
        run: |
          if out=$(cargo publish -p mpeg-ts --locked 2>&1); then
            echo "$out"; echo "::notice::published mpeg-ts"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::mpeg-ts already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish mpeg-ts"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
