name: Release rtsp-runtime

# Publishes the rtsp-runtime crate to crates.io on a `rtsp-runtime-v*` tag.
# rtsp-runtime is versioned and released INDEPENDENTLY. CI is the only source of
# published artifacts — never `cargo publish` from a workstation. Requires the
# CARGO_REGISTRY_TOKEN secret.
#
# DEPENDENCY ORDER: rtsp-runtime has NO workspace-crate dependencies (only the
# external rtsp-types / sdp-types / http-auth / tokio / rustls crates), so it can
# be published on its own with no ordering constraint.

on:
  push:
    tags: ["rtsp-runtime-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish rtsp-runtime to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Gate — rtsp-runtime tests (all features)
        run: cargo test -p rtsp-runtime --all-features --locked

      - name: Gate — rtsp-runtime clippy
        run: cargo clippy -p rtsp-runtime --all-features --all-targets --locked -- -D warnings

      - name: Gate — rtsp-runtime sans-IO (no-default) lib build
        run: cargo build -p rtsp-runtime --no-default-features --locked

      - name: Gate — tag matches rtsp-runtime version
        run: |
          TAG="${GITHUB_REF_NAME#rtsp-runtime-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['rtsp-runtime'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::rtsp-runtime is $V but tag is $TAG"; exit 1
          fi

      - name: Publish rtsp-runtime
        run: |
          if out=$(cargo publish -p rtsp-runtime --locked 2>&1); then
            echo "$out"; echo "::notice::published rtsp-runtime"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::rtsp-runtime already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish rtsp-runtime"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
