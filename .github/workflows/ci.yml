name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.75"] # 1.75 == workspace rust-version (MSRV)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      # --locked: the committed Cargo.lock pins MSRV-compatible dependency
      # versions (some newer transitive crates require edition2024 / Cargo 1.85).
      - name: Build (all features)
        run: cargo build --workspace --all-features --locked
      - name: Test (all features)
        run: cargo test --workspace --all-features --locked
      - name: Build (no default features)
        run: cargo build --workspace --no-default-features --locked

  lint:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Note: no `cargo fmt --check` gate — the source uses deliberate manual
      # column alignment (enum discriminants, Cargo.toml) that rustfmt undoes.
      - name: clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  docs:
    name: doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the docs (catches doc-code breakage). Not `-D warnings`: the
      # protocol docs use bit-range notation like `[7:4]` that rustdoc reports
      # as broken intra-doc links — cosmetic, renders fine as text.
      - name: cargo doc
        run: cargo doc --workspace --all-features --no-deps --locked
