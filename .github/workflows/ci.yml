name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.81"] # 1.81 == workspace rust-version (MSRV; core::error::Error)
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # --locked: the committed Cargo.lock pins MSRV-compatible dependency
      # versions (some newer transitive crates require edition2024 / Cargo 1.85).
      # dvb-stream is excluded from the core matrix: it depends on tokio whose
      # MSRV moves faster than the workspace 1.81 pin; it has its own CI job
      # below (stable-only). dvb-tools and dvb-conformance are excluded because
      # they are feature-forcing leaf crates that would mask regressions in
      # the library crates' bare --no-default-features build.
      - name: Build (all features)
        run: cargo build --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --all-features --locked
      # Examples are a published docs surface (they show on docs.rs and double as
      # compile-checked usage docs). Build the whole workspace's examples — no
      # excludes, so dvb-stream/dvb-conformance examples are covered too.
      - name: Build examples (all features)
        run: cargo build --workspace --examples --all-features --locked
      # nextest enforces the per-test terminate-after timeout (.config/nextest.toml
      # [profile.ci]) so a hung/runaway test FAILS instead of blocking CI; it does
      # not run doctests, which get their own bounded lane below.
      - name: Test (all features)
        run: cargo nextest run --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --all-features --locked --profile ci
      - name: Doctests (all features)
        timeout-minutes: 15
        run: cargo test --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --all-features --locked --doc
      # Exclude the feature-forcing leaf crates here. dvb-tools (binary) needs
      # dvb-si's ts/serde/chrono + dvb-t2mi's ts; dvb-conformance needs dvb-si's
      # ts/serde; dvb-stream always depends on tokio which has a faster-moving
      # MSRV than the workspace 1.81 lock. Including any of them would — via
      # workspace feature unification — force those features on and mask a
      # regression in the library crates' bare --no-default-features build.
      - name: Build (no default features)
        run: cargo build --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --no-default-features --locked
      # `--features std`: the library crates are #![no_std] with the default
      # `std` feature off, and the libtest harness requires std — so tests are
      # run with std re-enabled but the OTHER optional features (chrono/ts/serde)
      # still off, to catch feature-gating regressions. The bare-metal `no_std`
      # job below is what proves the #![no_std] build.
      - name: Test (no optional features, std on)
        run: cargo nextest run --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --no-default-features --features std --locked --profile ci
      - name: Doctests (no optional features, std on)
        timeout-minutes: 15
        run: cargo test --workspace --exclude dvb-tools --exclude dvb-conformance --exclude dvb-stream --no-default-features --features std --locked --doc

  lint:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Deliberate column alignment (TableId / DescriptorTag discriminants)
      # is protected by #[rustfmt::skip]; everything else is rustfmt-clean.
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  docs:
    name: doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Docs are warning-clean: bit-range notation is backticked (`[7:4]`)
      # so it can't be mistaken for intra-doc links. Keep it that way.
      - name: cargo doc
        run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  # True no_std proof: build each library crate for a bare-metal target with
  # its default `std` feature off. This is per-crate (no workspace feature
  # unification) and links without the std runtime — the only check that
  # genuinely enforces #![no_std] (the `--no-default-features` host lane above
  # does not, since std is present on the host). dvb-tools/dvb-stream are
  # std-only applications and are intentionally not built here.
  no-std:
    name: no_std (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Build each library crate for bare-metal (no_std)
        run: |
          for c in dvb-common dvb-bbframe dvb-scte35 dvb-t2mi dvb-si dvb-conformance dvb-pes dvb-subtitle mpeg-ps scte104 dvb-cc dvb-ci dvb-smpte2038 dvb-ule dvb-flute; do
            echo "::group::$c (no_std)"
            cargo build -p "$c" --no-default-features --target thumbv7em-none-eabi --locked
            echo "::endgroup::"
          done

  # Fuzz targets are not part of the workspace (own sub-workspace under fuzz/)
  # and so are never built by the jobs above — they rot silently when a crate's
  # parse API changes. This job builds every libfuzzer target on nightly (build
  # only, no run) so a broken target fails CI. RUSTFLAGS="-D warnings" is unset
  # here: cargo-fuzz injects sanitizer/coverage codegen flags and we only need a
  # compile smoke, not a warning gate (the library warning gate is the lint job).
  fuzz:
    name: fuzz build (nightly)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Build all fuzz targets
        working-directory: fuzz
        # No --locked: fuzz/Cargo.lock is gitignored (the harness is not a
        # published artifact), so CI resolves fresh against the current crates.
        # Pin the gnu target: the taiki-e cargo-fuzz binary is musl-static, so
        # its host triple leaks as the default --target (musl), whose std isn't
        # installed and whose static libc is incompatible with the sanitizer.
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu

  # dvb-stream is versioned and released independently from the lockstep
  # v-tag publish (tokio's MSRV moves faster than workspace 1.81). It is
  # tested on stable only in this dedicated job.
  dvb-stream:
    name: dvb-stream (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Build
        run: cargo build -p dvb-stream --all-features --locked
      - name: Test
        run: cargo nextest run -p dvb-stream --all-features --locked --profile ci
      - name: Doctests
        timeout-minutes: 10
        run: cargo test -p dvb-stream --all-features --locked --doc
      - name: Clippy
        run: cargo clippy -p dvb-stream --all-features --all-targets --locked -- -D warnings
      - name: rustfmt
        run: cargo fmt --all --check
      - name: Doc
        run: cargo doc -p dvb-stream --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"
