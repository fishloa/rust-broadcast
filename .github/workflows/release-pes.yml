name: Release dvb-pes

# Publishes the dvb-pes crate to crates.io on a `dvb-pes-v*` tag.
# dvb-pes is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is
# a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["dvb-pes-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dvb-pes to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — dvb-pes tests
        run: cargo test -p dvb-pes --all-features --locked

      - name: Gate — dvb-pes clippy
        run: cargo clippy -p dvb-pes --all-features --all-targets --locked -- -D warnings

      - name: Gate — dvb-pes no_std build
        run: cargo build -p dvb-pes --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches dvb-pes version
        run: |
          TAG="${GITHUB_REF_NAME#dvb-pes-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['dvb-pes'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::dvb-pes is $V but tag is $TAG"; exit 1
          fi

      # dvb-pes's dvb-common dependency must already be on crates.io (it ships via
      # the lockstep `v*` release). Idempotent: an "already uploaded" error is
      # treated as success so a re-run is safe.
      - name: Publish dvb-pes
        run: |
          if out=$(cargo publish -p dvb-pes --locked 2>&1); then
            echo "$out"; echo "::notice::published dvb-pes"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::dvb-pes already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish dvb-pes"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
