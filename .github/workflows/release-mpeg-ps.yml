name: Release mpeg-ps

# Publishes the mpeg-ps crate to crates.io on an `mpeg-ps-v*` tag.
# mpeg-ps is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it is
# a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["mpeg-ps-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish mpeg-ps to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Gate — mpeg-ps tests
        run: cargo test -p mpeg-ps --all-features --locked

      - name: Gate — mpeg-ps clippy
        run: cargo clippy -p mpeg-ps --all-features --all-targets --locked -- -D warnings

      - name: Gate — mpeg-ps no_std build
        run: cargo build -p mpeg-ps --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches mpeg-ps version
        run: |
          TAG="${GITHUB_REF_NAME#mpeg-ps-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['mpeg-ps'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::mpeg-ps is $V but tag is $TAG"; exit 1
          fi

      # mpeg-ps's dvb-common + dvb-pes dependencies must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish mpeg-ps
        run: |
          if out=$(cargo publish -p mpeg-ps --locked 2>&1); then
            echo "$out"; echo "::notice::published mpeg-ps"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::mpeg-ps already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish mpeg-ps"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
