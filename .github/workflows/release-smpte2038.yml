name: Release smpte2038

# Publishes the smpte2038 crate to crates.io on a `smpte2038-v*` tag.
# smpte2038 is versioned and released INDEPENDENTLY of the lockstep `v*` tag (it
# is a standalone reusable crate with its own cadence), so it has its own publish
# workflow. CI is the only source of published artifacts — never `cargo publish`
# from a workstation. Requires the CARGO_REGISTRY_TOKEN secret.
#
# Formerly dvb-smpte2038; the `dvb-smpte2038` shim is published via
# release-dvb-smpte2038.yml on dvb-smpte2038-v* tags.

on:
  push:
    tags: ["smpte2038-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish smpte2038 to crates.io
    runs-on: ubuntu-latest
    # crates.io publish is gated: pauses for manual approval by a
    # required reviewer before any cargo publish can run. See the
    # 'crates-io' environment (repo Settings -> Environments).
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Gate — smpte2038 tests
        run: cargo test -p smpte2038 --all-features --locked

      - name: Gate — smpte2038 clippy
        run: cargo clippy -p smpte2038 --all-features --all-targets --locked -- -D warnings

      - name: Gate — smpte2038 no_std build
        run: cargo build -p smpte2038 --no-default-features --target thumbv7em-none-eabi --locked

      - name: Gate — tag matches smpte2038 version
        run: |
          TAG="${GITHUB_REF_NAME#smpte2038-v}"
          V=$(cargo metadata --no-deps --format-version 1 --locked \
              | python3 -c "import json,sys; print({p['name']: p['version'] for p in json.load(sys.stdin)['packages']}['smpte2038'])")
          if [ "$V" != "$TAG" ]; then
            echo "::error::smpte2038 is $V but tag is $TAG"; exit 1
          fi

      # smpte2038's dvb-common dependency must already be on crates.io.
      # Idempotent: an "already uploaded" error is treated as success.
      - name: Publish smpte2038
        run: |
          if out=$(cargo publish -p smpte2038 --locked 2>&1); then
            echo "$out"; echo "::notice::published smpte2038"
          elif echo "$out" | grep -qiE "already (been )?uploaded|already exists"; then
            echo "$out"; echo "::notice::smpte2038 already on crates.io at this version — skipping"
          else
            echo "$out"; echo "::error::failed to publish smpte2038"; exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
