[package]
name         = "transmux"
version      = "0.16.0"
edition      = "2024"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/fishloa/rust-broadcast"
rust-version = "1.86"
description  = "MPEG-2 TS → CMAF/fMP4 remux: typed ISOBMFF boxes, a samples-in init/media segment builder, Annex B ↔ length-prefixed NAL, and HLS playlist generation (ISO/IEC 14496-12, RFC 8216)."
keywords     = ["cmaf", "fmp4", "isobmff", "hls", "remux"]
categories   = ["multimedia::video", "parser-implementations", "no-std"]
readme       = "README.md"

[dependencies]
broadcast-common = { path = "../broadcast-common", version = "8", default-features = false }
thiserror  = { version = "2", default-features = false }
serde      = { version = "1", default-features = false, features = ["derive", "alloc"], optional = true }
mp4-emsg   = { path = "../mp4-emsg",  version = "0.2", default-features = false }
mpeg-ts    = { path = "../mpeg-ts",  version = "0.2", default-features = false }
mpeg-pes   = { path = "../mpeg-pes", version = "0.2", default-features = false }
mpeg-ps    = { path = "../mpeg-ps",  version = "0.2", default-features = false }
rtp-packet = { path = "../rtp-packet", version = "0.2", default-features = false }
rtcp-packet = { path = "../rtcp-packet", version = "0.1", default-features = false }
aes        = { version = "0.8", default-features = false, optional = true }
ctr        = { version = "0.9", default-features = false, optional = true }
cbc        = { version = "0.1", default-features = false, optional = true }
clap       = { version = "4.5", features = ["derive"], optional = true }

[[bin]]
name = "transmux"
required-features = ["cli"]

[features]
default = ["std", "serde", "cenc"]
std    = ["broadcast-common/std", "thiserror/std", "serde?/std", "mp4-emsg/std", "mpeg-ts/std", "mpeg-pes/std", "mpeg-ps/std", "rtp-packet/std", "rtcp-packet/std"]
serde  = ["dep:serde", "mpeg-ts/serde", "mpeg-pes/serde", "mpeg-ps/serde", "rtcp-packet/serde"]
cenc   = ["dep:aes", "dep:ctr", "dep:cbc"]
# `sample-aes` adds Apple HLS Sample-AES + full-segment AES-128 (AES-128-CBC)
# content protection. Extends `cenc` (which already pulls the `cbc` mode crate
# for CENC's own `cbcs` pattern cipher) and adds the `alloc`/`block-padding`
# `cbc` sub-features for its PKCS#7 whole-segment API. All crypto stays
# feature-gated: the default no_std core build has none.
sample-aes = ["cenc", "cbc/alloc", "cbc/block-padding"]
# `cli` builds the `transmux` command-line packager (std + clap). The library
# itself stays `no_std`; only this feature/binary pulls `clap` and `std`.
cli    = ["dep:clap", "std"]

[dev-dependencies]
media-doctor = { path = "../media-doctor", default-features = false, features = ["std"] }
# golden_gate.rs (issue #569) shells out to `ffprobe -of json` and parses the
# result; already resolved workspace-wide at this version (see Cargo.lock), so
# this adds no new dependency to the tree.
serde_json   = "1.0"
# ssai_ad_stitch.rs (issue #664) wires transmux's splice/HLS/DASH machinery to
# the SCTE-35 cue parser and the SCTE-35<->HLS-DATERANGE/DASH-emsg conversion
# crate. Dev-dependency only: transmux itself stays free of a SCTE-35
# dependency (see `splice.rs`'s module docs, "Follow-up") — selecting splice
# *points* from SCTE-35 cues is left to callers, and this example is exactly
# that follow-up wiring, not a library dependency.
scte35-splice  = { path = "../scte35-splice", version = "1", default-features = false, features = ["std"] }
timed-metadata = { path = "../timed-metadata", default-features = false, features = ["std"] }

[package.metadata.docs.rs]
all-features = true
