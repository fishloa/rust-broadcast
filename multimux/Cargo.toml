[package]
name         = "multimux"
version      = "0.2.2"
edition      = "2024"
rust-version = "1.86"
license      = "MIT OR Apache-2.0"
description  = "Live RTSP -> LL-HLS just-in-time repackaging HTTP origin (library: tokio + axum)."
repository   = "https://github.com/fishloa/rust-broadcast"
keywords     = ["rtsp", "hls", "ll-hls", "cmaf", "origin"]
categories   = ["multimedia", "network-programming"]

[package.metadata.docs.rs]
all-features = true

[dependencies]
transmux          = { path = "../transmux",     version = "0.17" }
rtsp-runtime      = { path = "../rtsp-runtime",  version = "0.2", features = ["tokio"] }
# The LL-HLS origin engine itself (rolling window/store, blocking-reload +
# part-availability decision logic, playlist rendering — issue #663/#717
# Stage 2). multimux is now a thin tokio+axum adapter over
# `ll_hls_runtime::server`; see `output::llhls`.
ll-hls-runtime    = { path = "../ll-hls-runtime", version = "0.1", features = ["std"] }
sdp-types         = "0.1"
tokio             = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time", "sync", "signal"] }
axum              = "0.7"
serde             = { version = "1", features = ["derive"] }
serde_json        = "1"
thiserror         = "2"
url               = "2"
percent-encoding  = "2"
tracing           = "0.1"
metrics           = "0.24"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
tokio-rustls      = { version = "0.26", optional = true }

[features]
# `tls` is default-on: `rtsps://` sources should work out of the box. It pulls
# rtsp-runtime's `tls` feature (rustls/webpki-roots via its
# `default_tls_client_config` helper) plus `tokio-rustls` directly, needed here
# only to name the connected stream's concrete type
# (`tokio_rustls::client::TlsStream<TcpStream>`).
default     = ["tls"]
tls         = ["rtsp-runtime/tls", "dep:tokio-rustls"]
testsupport = []

[[example]]
name              = "serve_mock"
required-features = ["testsupport"]

[[example]]
name = "serve_rtsp"

[dev-dependencies]
tower            = { version = "0.5", default-features = false, features = ["util"] }
base64           = "0.22"
# Only needed by the ts_udp loopback test to mux a real, workspace-produced
# MPEG-2 TS fixture (via `Package::package`) rather than hand-faking TS bytes.
broadcast-common = { path = "../broadcast-common", version = "8" }
